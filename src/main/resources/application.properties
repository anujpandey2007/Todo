spring.application.name=ToDoList
# ==========================================
# MySQL Database Connection Configuration
# ==========================================

# 1. Database URL (Replace 'todo_db' with your actual database name)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://gateway01.ap-northeast-1.prod.aws.tidbcloud.com:4000/test?sslMode=VERIFY_IDENTITY}

# 2. Database Credentials
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:2Y2GJkBhaB6LcYw.root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:6oQbWxJxfqpMM1cI}

# 3. MySQL Driver Class
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate Configurations
# ==========================================

# Specifies the type of database so Hibernate can generate optimized SQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ddl-auto options:
# update: Updates the schema if your Entity classes change (Great for development)
# create-drop: Creates tables on startup and drops them when application stops
# none/validate: Standard for production environments
spring.jpa.hibernate.ddl-auto=update

# Shows the exact SQL queries executed by Hibernate in your console terminal
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true